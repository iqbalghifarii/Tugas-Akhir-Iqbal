<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk | Properti Villa</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
  
<body>

  <a href="https://www.youtube.com../embed/dQw4w9WgXcQ?autoplay=1&start=1" class="floating-btn-yt" target="_blank">
    <i class="fab fa-youtube"></i>
  </a>

  <div class="wrapper">
    <form id="loginForm">
      <h2>Masuk</h2>
      <div class="input-field">
        <input type="email" id="email" required>
        <label>Masukkan email Anda</label>
      </div>
      <div class="input-field">
        <input type="password" id="password" required>
        <label>Masukkan kata sandi</label>
      </div>
      <div class="forget">
        <label for="remember">
          <input type="checkbox" id="remember">
          <p>Ingat saya</p>
        </label>
        <a href="#">Lupa kata sandi?</a>
      </div>
      <button type="submit">Masuk Sekarang</button>
      <div class="register">
        <p>Belum punya akun? <a href="#">Daftar</a></p>
      </div>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault(); // Menghentikan refresh halaman

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // DATA AKUN DEMO (Bisa kamu info ke guru/penguji)
      const validEmail = "admin@villa.com";
      const validPass = "12345";

      // LOGIKA LOGIN
      if (email === validEmail && password === validPass) {
        alert("Login Berhasil! Selamat datang di Properti Villa.");
        // Pastikan path ../index.html benar (naik satu folder ke file utama)
        window.location.href = "../index.html"; 
      } 
      // OPSIONAL: Jika ingin mempermudah penguji (asal isi langsung masuk)
      // Gunakan logika ini jika kamu tidak ingin membatasi akun:
      else if (email !== "" && password !== "") {
        alert("Login Berhasil menggunakan mode tamu!");
        window.location.href = "../index.html";
      }
      else {
        alert("Gagal Masuk! Periksa kembali email dan kata sandi Anda.");
      }
    });
  </script>
</body>
</html>
